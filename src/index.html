<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BattleShip</title>
  </head>
  <body>
    <div class="hero">
      <div class="header"><h1>BATTLESHIP</h1></div>
      <div class="info">
        <p class="turn"></p>
      </div>
      <div class="container">
        <div class="p1Board" id="drop-target"></div>
        <div class="p2Board"></div>
      </div>
    </div>
    <div class="endPopup">
      <h1>GAME ENDED</h1>
      <p id="winner"></p>
      <button id="restart">RESTART</button>
    </div>
    <div class="ships">
      <button class="playBtn">PLAY</button>
    </div>
  </body>
</html>
